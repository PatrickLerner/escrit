sqlite: &sqlite
  adapter: sqlite3
  database: db/<%= Rails.env %>.sqlite3

defaults: &defaults
  pool: 5
  timeout: 5000
  encoding: utf8
  <<: *<%= ENV['RAILS_DB'] || "sqlite" %>

development:
  <<: *defaults

test: &test
  <<: *defaults

production:
  <<: *defaults
  host: localhost
  adapter: postgresql
  encoding: utf8
  database: escrit_production
  pool: 5
  username: <%= ENV['ESCRIT_DATABASE_USER'] %>
  password: <%= ENV['ESCRIT_DATABASE_PASSWORD'] %>

